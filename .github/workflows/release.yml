name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: macos-x64
          - platform: windows-latest
            args: ""
            label: windows-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Yomikura ${{ github.ref_name }}"
          releaseBody: |
            Yomikura（読み蔵）のリリース。

            ## macOS
            1. `.dmg` を開き、`Yomikura.app` を Applications フォルダにドラッグ
            2. **初回のみターミナルで quarantine を外す**:
               ```sh
               xattr -dr com.apple.quarantine /Applications/Yomikura.app
               ```
            3. Launchpad / Spotlight から `Yomikura` を起動
            4. 「マルウェア検証ができませんでした」と出たら:
               - **システム設定 → プライバシーとセキュリティ** をスクロール
               - 「`Yomikura.app` は ... ブロックされました」の右の **「このまま開く」** をクリック
               - 認証後にもう一度起動 → 「開く」を選択

            > Apple Developer Program 未加入のため公証なし。詳しい背景は [README](https://github.com/KITA-DS12/yomikura#macos) を参照。

            ## Windows
            `.msi` または `.exe` を実行してインストールしてください。

            > Microsoft Defender SmartScreen の警告が出る場合は「詳細情報」→「実行」で進めてください。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
