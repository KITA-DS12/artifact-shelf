name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: macos-x64
          - platform: windows-latest
            args: ""
            label: windows-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Yomikura ${{ github.ref_name }}"
          releaseBody: |
            Yomikura（読み蔵）のリリース。

            ## macOS
            `.dmg` を開き、`Yomikura.app` を Applications フォルダにドラッグしてください。

            > 初回起動時に「開発元が未確認です」警告が出る場合は、Finder で `.app` を右クリック → 開く で回避できます。

            ## Windows
            `.msi` または `.exe` を実行してインストールしてください。

            > Microsoft Defender SmartScreen の警告が出る場合は「詳細情報」→「実行」で進めてください。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
